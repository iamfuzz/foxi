# apko image definition for the Foxi Linux EC2 base image.
# Built from: local custom packages (linux-lts kernel) + Wolfi/Chainguard packages.
# Produce with: apko build images/ec2-base.yaml foxi:latest foxi.tar

contents:
  repositories:
    - https://packages.wolfi.dev/os
    - "@local /packages"          # locally built APKs (linux-lts, etc.)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - /packages/melange.rsa.pub  # generated by 'melange keygen'
  packages:
    # ── Kernel ─────────────────────────────────────────────────────────────
    - linux-lts@local

    # ── Base userspace ─────────────────────────────────────────────────────
    - wolfi-base
    - bash
    - busybox

    # ── Init system ────────────────────────────────────────────────────────
    # openrc keeps things minimal and is Alpine-familiar
    - openrc

    # ── Boot ───────────────────────────────────────────────────────────────
    - grub
    - grub-efi

    # ── Filesystem tools (needed during firstboot / cloud-init) ────────────
    - e2fsprogs
    - e2fsprogs-extra
    - dosfstools
    - util-linux

    # ── Cloud integration ──────────────────────────────────────────────────
    - cloud-init
    - cloud-utils-growpart    # expand root partition on first boot

    # ── SSH ────────────────────────────────────────────────────────────────
    - openssh-server
    - openssh-client

    # ── Networking ─────────────────────────────────────────────────────────
    - iproute2
    - iptables
    - dhcpcd

    # ── Core utilities ─────────────────────────────────────────────────────
    - coreutils
    - shadow                  # useradd/passwd
    - sudo
    - curl
    - wget
    - ca-certificates
    - tzdata

    # ── Package management (so the running instance can pull Chainguard pkgs)
    - apk-tools

archs:
  - x86_64
  - aarch64

entrypoint:
  command: /sbin/init

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

accounts:
  groups:
    - groupname: ec2-user
      gid: 1000
  users:
    - username: ec2-user
      uid: 1000
      group: ec2-user
      shell: /bin/bash
      home: /home/ec2-user

# Paths to include verbatim in the image
paths:
  - path: /etc/apk/repositories
    type: file
    permissions: 0o644
    contents: |
      https://packages.wolfi.dev/os

  - path: /etc/cloud/cloud.cfg.d/99-foxi.cfg
    type: file
    permissions: 0o644
    contents: |
      # Foxi Linux cloud-init overrides
      system_info:
        default_user:
          name: ec2-user
          groups: [wheel, adm]
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
      # Enforce IMDSv2
      datasource:
        Ec2:
          metadata_urls: ["http://169.254.169.254"]
          strict_id: true
      # Grow the root partition on first boot
      cloud_init_modules:
        - growpart
        - resizefs

  - path: /etc/ssh/sshd_config.d/50-cloud.conf
    type: file
    permissions: 0o600
    contents: |
      PermitRootLogin no
      PasswordAuthentication no
      AuthorizedKeysFile .ssh/authorized_keys
      UseDNS no

  # Disable serial getty so OpenRC doesn't fight with EC2 console
  - path: /etc/inittab
    type: file
    permissions: 0o644
    contents: |
      ::sysinit:/sbin/openrc sysinit
      ::sysinit:/sbin/openrc boot
      ::wait:/sbin/openrc default
      ttyS0::respawn:/sbin/getty -L ttyS0 115200 vt100
      tty1::respawn:/sbin/getty 38400 tty1
      ::shutdown:/sbin/openrc shutdown
