# apko image definition for the Foxi Linux EC2 base image.
# Built from: local custom packages (linux-lts kernel) + Wolfi/Chainguard packages.
# Produce with: scripts/build-image.sh  (passes --repository-append and --keyring-append for local pkgs)
#
# Note: grub and cloud-init are not in Wolfi; grub is installed from the build host
# in build-ami.sh, and EC2 SSH-key injection is handled by the foxi-ec2-init script
# that build-ami.sh writes into the rootfs.

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    # ── Kernel ─────────────────────────────────────────────────────────────
    - linux-lts@local

    # ── Base userspace ─────────────────────────────────────────────────────
    - wolfi-base
    - bash
    - busybox

    # ── Init system ────────────────────────────────────────────────────────
    - openrc

    # ── Filesystem tools ───────────────────────────────────────────────────
    - e2fsprogs
    - e2fsprogs-extra
    - dosfstools
    - util-linux
    - util-linux-misc

    # ── SSH ────────────────────────────────────────────────────────────────
    - openssh-server
    - openssh-client

    # ── Networking ─────────────────────────────────────────────────────────
    - iproute2
    - iptables
    - dhcpcd

    # ── Core utilities ─────────────────────────────────────────────────────
    - coreutils
    - shadow
    - sudo
    - curl
    - wget
    - ca-certificates
    - tzdata

    # ── Package management (so the running instance can pull Wolfi/Chainguard pkgs)
    - apk-tools

archs:
  - x86_64
  - aarch64

entrypoint:
  command: /sbin/init

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

accounts:
  groups:
    - groupname: ec2-user
      gid: 1000
  users:
    - username: ec2-user
      uid: 1000
      gid: 1000
      shell: /bin/bash
      homedir: /home/ec2-user

paths:
  - path: /home/ec2-user
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o700
