name: nginx
version: "1.5"
apk_package: nginx
description: Post-install setup for nginx on Foxi Linux

hooks:
  post-install:
    - action: run
      args:
        cmd: "apk add nginx-mainline-config nginx-mainline-openrc"
    - action: add_group
      args:
        name: nginx
        system: true
    - action: add_user
      args:
        name: nginx
        group: nginx
        system: true
        no_home: true
        shell: /sbin/nologin
        gecos: "nginx web server"
    - action: mkdir
      args:
        path: /var/log/nginx
        mode: "0750"
    - action: mkdir
      args:
        path: /var/lib/nginx/tmp
        mode: "0750"
    - action: chown
      args:
        path: /var/log/nginx
        owner: nginx
        group: nginx
    - action: chown
      args:
        path: /var/lib/nginx
        owner: nginx
        group: nginx
        recursive: true
    - action: run
      args:
        cmd: "sed -i 's|^#pid.*|pid /run/nginx.pid;|' /etc/nginx/nginx.conf"
    - action: run
      args:
        cmd: "rc-update add nginx default"
    - action: run
      args:
        cmd: "rc-service nginx start"

  pre-remove:
    - action: run
      args:
        cmd: "rc-service nginx stop 2>/dev/null || true"
    - action: run
      args:
        cmd: "rc-update del nginx default 2>/dev/null || true"
